<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Vivido">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Vivido</title>

  <!-- live base href path and link rel-->
  <base href="/">
  <link rel="manifest" href="web/manifest.json">

</head>

<body>

<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('flutter-first-frame', function () {
      navigator.serviceWorker.register('flutter_service_worker.js?v=3214312957');
    });
  }

  var isCtrl = false;
  document.onkeyup=function(e){
    if(e.keyCode == 17) isCtrl=false;
  }

  document.onkeydown=function(e){
    if(e.keyCode == 17) isCtrl=true;
    if(e.keyCode == 83 && isCtrl == true) {

      return false;
    }
}

</script>


<script src="main.dart.js?version=35" type="application/javascript"></script>
</body>
</html>
